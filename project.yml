name: oh-my-opensnap
options:
  bundleIdPrefix: com.goldenrabbit
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 language mode: AppKit/콜백 코드 안정성 우선
    MARKETING_VERSION: "1.0.56"
    CURRENT_PROJECT_VERSION: "57"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES

targets:
  oh-my-opensnap:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Sparkle
    info:
      path: Config/Info.plist
      properties:
        LSUIElement: true                              # 메뉴바 상주, Dock 아이콘 숨김
        CFBundleDisplayName: oh-my-opensnap
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2026 Golden Rabbit"
        # Sparkle 자동 업데이트
        SUFeedURL: https://raw.githubusercontent.com/Canine89/oh-my-opensnap/main/appcast.xml
        SUPublicEDKey: iWBHueR8+zpSgvCBOBj1RUNqJbSGpQHkSyuCcMFeDoM=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400                # 하루 1회 백그라운드 확인
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goldenrabbit.ohmyopensnap
        PRODUCT_NAME: oh-my-opensnap
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M7NU9F8CZN      # 안정 서명 → 화면녹음 권한 유지 (adhoc 방지)
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
