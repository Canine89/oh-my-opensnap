name: oh-my-opensnap
options:
  bundleIdPrefix: com.goldenrabbit
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.0"            # Swift 5 language mode: AppKit/콜백 코드 안정성 우선
    MARKETING_VERSION: "1.0.66"
    CURRENT_PROJECT_VERSION: "67"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEAD_CODE_STRIPPING: YES

targets:
  oh-my-opensnap:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Sparkle
    info:
      path: Config/Info.plist
      properties:
        LSUIElement: true                              # 메뉴바 상주, Dock 아이콘 숨김
        CFBundleDisplayName: oh-my-opensnap
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2026 Golden Rabbit"
        # Sparkle 자동 업데이트
        SUFeedURL: https://raw.githubusercontent.com/Canine89/oh-my-opensnap/main/appcast.xml
        SUPublicEDKey: iWBHueR8+zpSgvCBOBj1RUNqJbSGpQHkSyuCcMFeDoM=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400                # 하루 1회 백그라운드 확인
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goldenrabbit.ohmyopensnap
        PRODUCT_NAME: oh-my-opensnap
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M7NU9F8CZN      # 안정 서명 → 화면녹음 권한 유지 (adhoc 방지)
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

  # Mac App Store 배포 타깃 — 같은 소스, Sparkle 없음, 샌드박스 필수.
  # 무료판(위)과의 차이는 MAS 컴파일 플래그(#if MAS)로만 표현한다.
  oh-my-opensnap-mas:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources
    info:
      path: Config/Info-MAS.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: oh-my-opensnap
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: "Copyright © 2026 Golden Rabbit"
        ITSAppUsesNonExemptEncryption: false           # 심사 시 수출 규정 문답 생략
        LSApplicationCategoryType: public.app-category.productivity   # MAS 제출 필수
    entitlements:
      path: Config/OhMyOpenSnap-MAS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goldenrabbit.ohmyopensnap.mas
        # Finder/Applications에 보이는 이름. 무료판과 같은 이름이지만 타깃별로 빌드하므로 충돌 없음.
        PRODUCT_NAME: oh-my-opensnap
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M7NU9F8CZN
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
